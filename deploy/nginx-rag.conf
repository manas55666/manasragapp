# Nginx reverse-proxy vhost for the RAG service.
# Certbot/Let's Encrypt manages the TLS lines (added during `certbot --nginx`).
# This file documents the routing the EC2 host applies; copy it into
# /etc/nginx/sites-available/ on the server.

server {
    listen 80;
    server_name rag.example.com;   # replace with your domain/subdomain

    # Allow uploads larger than Nginx's 1 MB default for document files.
    client_max_body_size 25m;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
