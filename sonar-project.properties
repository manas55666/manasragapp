# SonarCloud configuration for the RAG app.
# Replace the organization/key with your own SonarCloud values.
sonar.organization=manas-org
sonar.projectKey=manas-rag-app

sonar.sources=app
sonar.tests=tests
sonar.python.version=3.11

# Coverage report consumed by Sonar (generated in CI via pytest --cov).
sonar.python.coverage.reportPaths=coverage.xml

# Exclude generated/vendored paths from analysis.
sonar.exclusions=**/__pycache__/**,data/**,logs/**
